version: "3"

services:
  devopsdb:
    image: ashishgourishetty/automation1:db
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          cpu:"0.5"
          memory:120M
        reservation:
          cpu:"0.25"
          memory: 64M
    volumes:
     - dbdata: /etc/flm
    networks:
      - mynetwork
      

  application:
    image: ashishgourishetty/automation1:app
    ports:
      - "1111:8080"
    deploy:
      replicas: 3
      resources:
        limits:
          cpu:"0.5"
          memory:120M
        reservation:
          cpu:"0.25"
          memory: 64M
    volumes:
        - appdata: /opt/ashish
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
volumes:
   appdata:
   dbdata:
